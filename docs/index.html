<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estate Sale Companies | EstateSaleRatings.com</title>
<meta name="description" content="Curated estate sale companies in Florida. Search by rating, company name and location.">
<style>
/* General Reset & Body */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f8; color: #1a1a1a; }

/* Header */
header { background: #004d40; color: white; text-align: center; padding: 24px 16px; }
header h1 { font-size: 2rem; margin-bottom: 8px; }
header p { font-size: 1rem; opacity: 0.85; }

/* Navigation */
nav { background: #00796b; text-align: center; padding: 12px 0; }
nav a { color: #e0f2f1; text-decoration: none; margin: 0 16px; font-weight: bold; }
nav a:hover { color: white; }

/* Container */
.container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

/* Filters */
.filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; justify-content: center; }
.filter-bar select, .filter-bar input { padding: 8px 12px; font-size: 0.95rem; border-radius: 4px; border: 1px solid #ccc; }

/* Company Grid */
.company-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

/* Company Card */
.company-card { background: white; border-radius: 10px; padding: 18px; border: 1px solid #ddd; box-shadow: 0 3px 6px rgba(0,0,0,0.05); text-align: center; transition: transform 0.2s; }
.company-card:hover { transform: translateY(-2px); }
.company-card img { max-width: 80px; max-height: 80px; object-fit: contain; margin-bottom: 12px; }
.company-card h3 { color: #004d40; font-size: 1.1rem; margin-bottom: 6px; }
.company-card .location { font-size: 0.85rem; color: #555; margin-bottom: 6px; }
.company-card .rating { font-size: 0.9rem; margin-bottom: 8px; }
.company-card .stars { color: #fbc02d; font-size: 1rem; }
.company-card .review-count { font-size: 0.8rem; color: #777; }
.company-card .contact a { color: #00796b; text-decoration: none; font-size: 0.85rem; margin-left: 6px; }
.company-card .contact a:hover { text-decoration: underline; }

/* Footer */
footer { background: #004d40; color: #b2dfdb; text-align: center; padding: 24px; margin-top: 48px; font-size: 0.85rem; }
footer a { color: #e0f2f1; text-decoration: none; }
footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <h1>EstateSaleRatings.com</h1>
  <p>Find top-rated estate sale companies near you</p>
</header>

<nav>
  <a href="/">Home</a>
  <a href="/florida/">Florida</a>
</nav>

<div class="container">
  <div class="filter-bar">
    <select id="ratingFilter">
      <option value="">Min Rating</option>
      <option value="5">5★</option>
      <option value="4.5">4.5★</option>
      <option value="4">4★</option>
      <option value="3.5">3.5★</option>
    </select>
    <input type="text" id="searchFilter" placeholder="Search company name...">
    <button onclick="applyFilters()">Filter</button>
  </div>

  <div class="company-grid" id="companyGrid">
    <!-- Company cards will appear here -->
    <p style="grid-column:1/-1; text-align:center; color:#777;">Use the filters above to see companies.</p>
  </div>
</div>

<footer>
  &copy; 2026 EstateSaleRatings.com | <a href="/privacy">Privacy Policy</a>
</footer>

<!-- JS file from CSV -->
<script src="companies.js"></script>
<script>
const companyGrid = document.getElementById("companyGrid");
const ratingFilterEl = document.getElementById("ratingFilter");
const searchFilterEl = document.getElementById("searchFilter");

// Initially hide all companies
let filteredCompanies = [];

// Apply filters
function applyFilters() {
  const minRating = parseFloat(ratingFilterEl.value) || 0;
  const search = searchFilterEl.value.toLowerCase();

  filteredCompanies = allCompanies.filter(c => {
    const rating = parseFloat(c.google_rating) || 0;
    const reviewCount = parseInt(c.google_review_count) || 0;
    const matchRating = rating >= minRating;
    const matchSearch = search ? c.name.toLowerCase().includes(search) : true;
    return matchRating && matchSearch;
  });

  renderCompanies(filteredCompanies);
}

// Render company cards
function renderCompanies(companies) {
  companyGrid.innerHTML = "";
  if (companies.length === 0) {
    companyGrid.innerHTML = "<p style='grid-column:1/-1; text-align:center; color:#777;'>No companies match the filters.</p>";
    return;
  }

  companies.forEach(c => {
    const rating = parseFloat(c.google_rating) || 0;
    const reviewCount = parseInt(c.google_review_count) || 0;

    const card = document.createElement("div");
    card.className = "company-card";
    card.innerHTML = `
      ${c.logoUrl ? `<img src="${c.logoUrl}" alt="${c.name} logo">` : ""}
      <h3>${c.name}</h3>
      <div class="location">${c.cityName}, ${c.stateCode}</div>
      <div class="rating"><span class="stars">${rating ? "★".repeat(Math.round(rating)) : "N/A"}</span> <span class="review-count">(${reviewCount} reviews)</span></div>
      <div class="contact">
        ${c.phoneNumber ? `<span>${c.phoneNumber}</span>` : ""}
        ${c.websiteUrl ? `<a href="${c.websiteUrl}" target="_blank" rel="nofollow">Visit Website</a>` : ""}
      </div>
    `;
    companyGrid.appendChild(card);
  });
}
</script>

</body>
</html>
